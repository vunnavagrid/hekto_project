<aside class="cart-summary">
  <h3 class="cart-summary__title">Cart Totals</h3>

  <div class="cart-summary__row">
    <span>Subtotal</span>
    <span>${{ subtotal() }}</span>
  </div>

  <div class="cart-summary__row">
    <span>Shipping</span>
    <span>{{ shipping() === 0 ? 'Free' : '$' + shipping() }}</span>
  </div>

  @if (shipping() > 0) {
    <p class="cart-summary__hint">
      Add ${{ freeShippingThreshold() - subtotal() }} more for free shipping.
    </p>
  }

  <div class="cart-summary__row cart-summary__row--total">
    <span>Total</span>
    <span>${{ total() }}</span>
  </div>

  <button type="button" class="btn-accent cart-summary__checkout" (click)="checkout.emit()">
    Proceed To Checkout
  </button>
</aside>
