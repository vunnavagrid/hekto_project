<article class="cart-item">
  <a [routerLink]="['/products', item().product.id]" class="cart-item__media">
    <img [src]="item().product.image" [alt]="item().product.name" loading="lazy" />
  </a>

  <a [routerLink]="['/products', item().product.id]" class="cart-item__name">
    {{ item().product.name }}
  </a>

  <span class="cart-item__price">${{ item().product.price }}</span>

  <app-quantity-selector
    class="cart-item__qty"
    [value]="item().quantity"
    (valueChange)="onQuantityChange($event)"
  />

  <span class="cart-item__total">${{ lineTotal() }}</span>

  <button type="button" class="cart-item__remove" (click)="onRemove()" aria-label="Remove item">
    <svg viewBox="0 0 20 20" aria-hidden="true">
      <line x1="5" y1="5" x2="15" y2="15" stroke="currentColor" stroke-width="1.6" />
      <line x1="15" y1="5" x2="5" y2="15" stroke="currentColor" stroke-width="1.6" />
    </svg>
  </button>
</article>
