<span class="rating" [class.rating--md]="size() === 'md'" [attr.aria-label]="rating() + ' out of 5 stars'">
  <span class="rating__stars">
    @for (state of stars(); track $index) {
      <svg
        class="rating__star"
        [class.is-empty]="state === 'empty'"
        [class.is-half]="state === 'half'"
        viewBox="0 0 20 20"
        aria-hidden="true"
      >
        @if (state === 'half') {
          <defs>
            <linearGradient [id]="'half-' + $index">
              <stop offset="50%" stop-color="currentColor" />
              <stop offset="50%" stop-color="transparent" />
            </linearGradient>
          </defs>
          <path
            [attr.fill]="'url(#half-' + $index + ')'"
            stroke="currentColor"
            stroke-width="1"
            d="M10 1.5l2.6 5.27 5.82.85-4.21 4.1 1 5.78L10 14.9l-5.21 2.6 1-5.78-4.21-4.1 5.82-.85L10 1.5z"
          />
        } @else {
          <path
            d="M10 1.5l2.6 5.27 5.82.85-4.21 4.1 1 5.78L10 14.9l-5.21 2.6 1-5.78-4.21-4.1 5.82-.85L10 1.5z"
          />
        }
      </svg>
    }
  </span>
  @if (reviewCount() !== undefined) {
    <span class="rating__count">({{ reviewCount() }})</span>
  }
</span>
