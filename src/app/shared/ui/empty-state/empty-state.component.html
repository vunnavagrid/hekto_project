<div class="empty-state">
  <svg class="empty-state__icon" viewBox="0 0 64 64" aria-hidden="true">
    <circle cx="32" cy="32" r="30" fill="none" stroke="currentColor" stroke-width="2" />
    <path d="M18 24h28l-3 18H21l-3-18z" fill="none" stroke="currentColor" stroke-width="2" />
    <line x1="24" y1="24" x2="24" y2="18" stroke="currentColor" stroke-width="2" />
    <line x1="40" y1="24" x2="40" y2="18" stroke="currentColor" stroke-width="2" />
    <circle cx="25" cy="46" r="2.4" fill="currentColor" />
    <circle cx="39" cy="46" r="2.4" fill="currentColor" />
  </svg>

  <h2 class="empty-state__title">{{ title() }}</h2>

  @if (message()) {
    <p class="empty-state__message">{{ message() }}</p>
  }

  @if (ctaLabel()) {
    <a [routerLink]="ctaLink()" class="btn-accent empty-state__cta">{{ ctaLabel() }}</a>
  }
</div>
