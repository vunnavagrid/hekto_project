<article class="blog-card">
  <a href="javascript:void(0)" class="blog-card__media">
    <img [src]="post().image" [alt]="post().title" loading="lazy" />
  </a>
  <div class="blog-card__body">
    <span class="blog-card__meta">{{ post().date }} &middot; {{ post().category }}</span>
    <h3 class="blog-card__title">
      <a href="javascript:void(0)">{{ post().title }}</a>
    </h3>
    <a href="javascript:void(0)" class="blog-card__link">Read More</a>
  </div>
</article>
